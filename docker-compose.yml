services:
  neo4j:
    image: neo4j:5.26-community
    container_name: bioinsight-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/changeme
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  seed:
    build:
      context: .
      dockerfile: Dockerfile.seed
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: changeme
    depends_on:
      neo4j:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: bioinsight-api
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: changeme
      CORS_ORIGINS: http://localhost:8080,http://localhost:5173,http://localhost
    depends_on:
      neo4j:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 25s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: bioinsight-web
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  neo4j_data:
